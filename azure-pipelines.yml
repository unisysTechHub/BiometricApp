trigger:
- main

pool:
  vmImage: 'macos-latest'

steps:
# Display agent information
- script: |
    echo "===== Agent Information ====="
    echo "Agent OS           : $(Agent.OS)"
    echo "Agent Name         : $(Agent.Name)"
    echo "Agent Machine Name : $(Agent.MachineName)"
    echo "ImageOS            : $ImageOS"
    echo "ImageVersion       : $ImageVersion"
  displayName: 'Show Agent Information'

# Display operating system details
- script: |
    echo "===== Operating System ====="
    sw_vers
    echo ""
    uname -a
  displayName: 'Show macOS Version'

# Display installed development tools
- script: |
    echo "===== Java ====="
    java -version || true
    javac -version || true
    echo ""

    echo "===== Xcode ====="
    xcodebuild -version || true
    xcode-select -p || true
    echo ""

    echo "===== Gradle ====="
    gradle --version || true
    ./gradlew --version || true
    echo ""

    echo "===== Node.js ====="
    node --version || true
    npm --version || true
    echo ""

    echo "===== Python ====="
    python --version || true
    python3 --version || true
    pip --version || true
    pip3 --version || true
    echo ""

    echo "===== Ruby ====="
    ruby --version || true
    gem --version || true
    echo ""

    echo "===== Git ====="
    git --version || true
    echo ""

    echo "===== Docker ====="
    docker --version || true
    docker compose version || true
  displayName: 'Show Installed Tool Versions'

# List environment variables
- script: |
    echo "===== Environment Variables ====="
    env | sort
  displayName: 'Show Environment Variables'

# Existing Android build step
- task: Gradle@2
  displayName: 'Assemble Debug APK'
  inputs:
    gradleWrapperFile: 'gradlew'
    tasks: 'assembleDebug'
    publishJUnitResults: false
    testResultsFiles: '**/TEST-*.xml'
    gradleOptions: '-Xmx3072m'
    workingDirectory: ''