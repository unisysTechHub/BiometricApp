# Android
# Build Android app with modules stored in separate GitHub repositories.

trigger:
- main

resources:
  repositories:
    - repository: api
      type: github
      endpoint: GithubServiceConnection
      name: unisystechhub/API

    - repository: compose
      type: github
      endpoint: GithubServiceConnection
      name: unisystechhub/Compose

pool:
  vmImage: 'macos-latest'

steps:
- checkout: self

- checkout: api
  path: API

- checkout: compose
  path: Compose

- script: |
    echo "Workspace Structure:"
    pwd
    ls -R
  displayName: 'Inspect Repository Structure'
- script: |
    cd BiometricApp
    ls -la APIModule
    cat settings.gradle
    cat APIModule/build.gradle || cat APIModule/build.gradle.kts
  displayName: 'Inspect APIModule'
- script: |
    echo "Current directory:"
    pwd
    echo "Files:"
    ls -la
    echo "Searching for gradlew:"
    find . -name gradlew
  displayName: 'Debug workspace'
- script: |
    cd BiometricApp
    chmod +x gradlew
    java -version
    ./gradlew --version
    ./gradlew assembleDebug --stacktrace
  displayName: 'Assemble Debug APK'