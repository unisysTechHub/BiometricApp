# Android
# Build Android app with modules stored in separate GitHub repositories.

trigger:
- main

resources:
  repositories:
    - repository: api
      type: github
      endpoint: GithubServiceConnection
      name: unisystechhub/API

    - repository: compose
      type: github
      endpoint: GithubServiceConnection
      name: unisystechhub/Compose

pool:
  name: 'android-agent'

steps:
- checkout: self

- checkout: api
  path: API

- checkout: compose
  path: Compose

- script: |
    echo "Workspace Structure:"
    pwd
    ls -R
  displayName: 'Inspect Repository Structure'
- script: |
    echo "=== /Users/runner/work/1 ==="
    ls -la /Users/runner/work/1

    echo "=== API ==="
    ls -la /Users/runner/work/1/API || true

    echo "=== Compose ==="
    ls -la /Users/runner/work/1/Compose || true

    echo "=== BiometricApp ==="
    ls -la /Users/runner/work/1/s/BiometricApp || true
  displayName: 'Inspect checkout directories'
- script: |
    echo "Current directory:"
    pwd
    echo "Files:"
    ls -la
    echo "Searching for gradlew:"
    find . -name gradlew
  displayName: 'Debug workspace'
- script: |
    cd /Users/runner/work/1/s/BiometricApp
    chmod +x gradlew
    ./gradlew :APIModule:tasks --stacktrace
  displayName: APIModule tasks  
- task: Gradle@2
  displayName: 'Assemble Debug APK'
  inputs:
    workingDirectory: 'BiometricApp'
    gradleWrapperFile: 'BiometricApp/gradlew'
    gradleOptions: '-Xmx3072m'
    publishJUnitResults: false
    testResultsFiles: '**/TEST-*.xml'
    tasks: 'assembleDebug'  

- script: |
    cd BiometricApp
    chmod +x gradlew
    java -version
    ./gradlew --version
    ./gradlew assembleDebug --stacktrace
  displayName: 'Assemble Debug APK'